<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인적자원관리 과제 추천기</title>
  <style>
    body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#0f172a;color:#e2e8f0}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}
    .card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:14px}
    h1{margin:6px 0 10px}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    label{font-size:13px;color:#cbd5e1;display:block;margin-bottom:4px}
    select,input{width:100%;padding:8px;border-radius:8px;border:1px solid #475569;background:#0b1222;color:#e2e8f0}
    button{padding:9px 12px;border-radius:10px;border:1px solid #475569;background:#334155;color:#fff;cursor:pointer}
    .primary{background:#2563eb;border:none}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .result h2{margin:4px 0}
    .chip{display:inline-block;padding:4px 8px;border-radius:999px;background:#334155;font-size:12px;margin-right:6px}
    .summary{display:none;margin:8px 0;padding:10px;border:1px dashed #64748b;border-radius:8px;background:#0b1222}
    .summary.open{display:block}
    .muted{color:#94a3b8;font-size:13px}
    .modal{position:fixed;inset:0;background:rgba(2,6,23,.75);display:none;align-items:center;justify-content:center;padding:20px}
    .modal.open{display:flex}
    .modal-box{max-width:900px;width:100%;max-height:85vh;overflow:auto;background:#1e293b;border:1px solid #475569;border-radius:14px;padding:14px}
    .idea-item{border:1px solid #334155;border-radius:10px;padding:10px;margin-bottom:10px;background:#0f172a}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>인적자원관리 과제 추천기</h1>
      <p class="muted">조건을 선택해 과제를 추천받고, 전체 63개 과제도 한 번에 볼 수 있습니다.</p>
    </section>

    <section class="card">
      <div class="grid">
        <div><label>주제</label><select id="topic"></select></div>
        <div><label>활동 방식</label><select id="type"></select></div>
        <div><label>난이도</label><select id="difficulty"></select></div>
        <div><label>팀 형태</label><select id="team"></select></div>
        <div><label>진행 시간</label><select id="duration"></select></div>
        <div><label>키워드</label><input id="keyword" placeholder="예: 조기 퇴사, 평가" /></div>
      </div>
      <div class="actions">
        <button id="recommendBtn" class="primary">추천받기</button>
        <button id="nextBtn">다른 아이디어 보기</button>
        <button id="openAllBtn">전체 아이디어 보기</button>
      </div>
    </section>

    <section class="card result" id="resultCard">
      <p class="muted">추천받기를 눌러주세요.</p>
    </section>
  </div>

  <div class="modal" id="allModal" aria-hidden="true">
    <div class="modal-box">
      <div class="actions" style="justify-content:space-between">
        <strong>전체 아이디어 63개</strong>
        <button id="closeAllBtn">닫기</button>
      </div>
      <div id="allList"></div>
    </div>
  </div>

  <script>
    const categories = [
      '채용·선발','교육훈련','성과관리','보상·평가','조직문화','리더십','노사관계','AI 윤리','직무·역량'
    ];
    const seedTitles = {
      '채용·선발':['구인 공고를 쉽게 써서 지원자 늘리기 활동','작은 회사 면접 질문을 공정하게 고치기 활동','채용 후 한 달 안에 그만두는 문제 줄이기 활동','경력보다 일 역량을 확인하는 채용 기준 만들기 활동','채용 과정에서 지원자 연락 지연 문제 해결 활동','지인 추천 채용의 장단점 살펴보고 원칙 세우기 활동','학력보다 실제 업무 수행력을 보는 선발 기준 마련 활동'],
      '교육훈련':['신입 직원 첫 주 적응 돕는 교육 순서 만들기 활동','바쁜 현장에서 짧게 배우는 사내 교육 시간표 만들기 활동','사수에게만 의존하지 않는 업무 인수인계 자료 만들기 활동','직무별 필수 교육을 빠짐없이 챙기는 점검표 만들기 활동','배운 내용을 바로 일에 적용하게 돕는 실습 계획 활동','중간 관리자 코칭 능력 키우는 교육 장면 연습 활동','교육 후 성과 변화를 확인하는 쉬운 측정표 만들기 활동'],
      '성과관리':['모호한 평가 기준을 구체 행동 기준으로 바꾸기 활동','성과 면담에서 상처 주지 않고 말하는 방법 연습 활동','개인 성과와 팀 성과를 함께 반영하는 평가표 만들기 활동','평가 점수 편차가 큰 문제를 줄이는 조정 회의 활동','저성과 직원을 돕는 단계별 지원 계획 세우기 활동','목표를 자주 바꾸는 현장에서 분기 목표 다시 맞추기 활동','평가 결과를 보상과 성장 계획에 함께 연결하는 활동'],
      '보상·평가':['같은 일에 다른 임금이 생기는 문제 점검 활동','중소기업 형편에 맞는 수당 체계 다시 정리 활동','성과급 기준을 직원이 납득하게 설명하는 활동','연봉 협의 때 갈등을 줄이는 대화 문장 연습 활동','돈이 아니어도 동기를 높이는 보상 방법 찾기 활동','복지 예산이 적을 때 우선순위 정하는 의사결정 활동','평가 등급 결정 근거를 문서로 남기는 기준 만들기 활동'],
      '조직문화':['말하기 어려운 분위기를 바꾸는 회의 규칙 만들기 활동','세대 간 일하는 방식 차이를 조정하는 대화 활동','작은 회사에서 소문과 오해가 커지는 문제 줄이기 활동','팀장과 직원 사이 신뢰를 높이는 약속 정하기 활동','원격 근무와 출근 근무 사이 협업 기준 맞추기 활동','잦은 야근 문화를 줄이고 일의 우선순위 세우기 활동','신입 직원이 소속감을 느끼게 돕는 첫 달 계획 활동'],
      '리더십':['중소기업 팀장이 업무 지시를 분명하게 하는 연습 활동','감정 섞인 지적 대신 사실 중심 피드백 연습 활동','갑작스런 고객 불만 상황에서 팀을 이끄는 대응 활동','업무 몰림을 줄이기 위한 공정한 일 배분 기준 활동','팀장 실수 이후 신뢰를 회복하는 말과 행동 계획 활동','성과 압박 속에서도 사람을 지키는 리더 선택 토의 활동','신입과 경력 직원을 함께 성장시키는 지도 방법 활동'],
      '노사관계':['연장근무 협의에서 갈등을 줄이는 대화 절차 활동','근무표 변경 통보 방식이 불만을 키우는 문제 점검 활동','안전사고 이후 노사 공동 재발방지 약속 만들기 활동','임금 인상 요구와 회사 사정을 함께 보는 협의 활동','고충 접수 창구가 유명무실한 문제 개선 활동','퇴직 의사 표현 후 인수인계 갈등 줄이는 기준 활동','노사 신뢰 점검표를 만들어 분기별로 확인하는 활동'],
      'AI 윤리':['인공지능 채용 도구 사용 전 점검해야 할 기준 활동','직원 감시 기술 도입 시 사생활 보호 원칙 세우기 활동','인공지능 추천 결과를 맹신하지 않기 위한 검토 활동','인사 자료 수집 범위를 최소로 정하는 규칙 만들기 활동','자동 평가 결과에 이의 제기 절차를 설계하는 활동','인공지능 활용 안내문을 쉬운 말로 다시 쓰는 활동','사람 판단과 기계 판단 책임을 나누는 기준 활동'],
      '직무·역량':['작은 회사에서 꼭 필요한 핵심 직무를 다시 정리 활동','직무 설명서 없이 일하는 문제를 줄이는 문서화 활동','한 사람이 여러 일을 맡을 때 역량 기준 세우기 활동','경력 사원이 떠나도 업무가 멈추지 않게 대비 활동','직무 전환이 필요한 직원을 위한 학습 경로 설계 활동','채용 시 요구 역량과 실제 업무 역량 차이 줄이기 활동','직원별 성장 계획을 반기 단위로 점검하는 활동']
    };

    const types = ['토론','발표','실습','케이스 분석','PBL','롤플레이','토론'];
    const difficulties = ['입문','기초','중간','심화','중간','기초','입문'];
    const teams = ['개인','2인','소그룹','전원 참여','소그룹','2인','개인'];
    const durations = ['10분','20분','30분','50분','20분','30분','10분'];

    const topicIssues = {
      '채용·선발':'지원자 부족, 면접 기준 불명확, 조기 퇴사',
      '교육훈련':'교육 시간 부족, 인수인계 부실, 현장 적용 어려움',
      '성과관리':'평가 기준 모호, 면담 갈등, 목표와 실행 불일치',
      '보상·평가':'임금 형평성 논란, 낮은 복지 예산, 보상 기준 불신',
      '조직문화':'소통 단절, 불필요한 야근, 세대 간 갈등',
      '리더십':'지시 혼선, 피드백 갈등, 팀 신뢰 저하',
      '노사관계':'근무조건 갈등, 고충 처리 지연, 협의 절차 불신',
      'AI 윤리':'과도한 자료 수집, 자동 판단 오류, 책임 소재 불분명',
      '직무·역량':'직무 경계 불명확, 다기능 인력 부담, 성장 경로 부족'
    };

    const ideas = categories.flatMap(topic => seedTitles[topic].map((title, i) => ({
      id: `${topic}-${i+1}`,
      title, topic,
      type: types[i], difficulty: difficulties[i], team: teams[i], duration: durations[i],
      summary: `${title}을 중심으로 한국 중소기업이 자주 겪는 ${topicIssues[topic]} 문제를 사례로 분석하고, 실제 현장에서 바로 적용할 해결 방안을 찾는 활동입니다.`,
      process: '① 사례에서 문제 장면을 찾습니다. ② 원인을 사람·제도·소통 관점으로 나눠 정리합니다. ③ 실행 가능한 해결안 2가지를 비교해 1가지를 선택합니다.',
      output: '원인 분석표 1장, 실행안 비교표 1장, 최종 선택 이유',
      why: `${topic} 문제는 중소기업일수록 한 번의 판단이 전체 성과에 크게 영향을 주기 때문에, 사례 기반 연습이 필요합니다.`
    })));

    const els = {
      topic: document.getElementById('topic'), type: document.getElementById('type'), difficulty: document.getElementById('difficulty'),
      team: document.getElementById('team'), duration: document.getElementById('duration'), keyword: document.getElementById('keyword'),
      recommendBtn: document.getElementById('recommendBtn'), nextBtn: document.getElementById('nextBtn'), openAllBtn: document.getElementById('openAllBtn'),
      resultCard: document.getElementById('resultCard'), allModal: document.getElementById('allModal'), closeAllBtn: document.getElementById('closeAllBtn'), allList: document.getElementById('allList')
    };

    const state = { current:null, pool:[] };

    function fillSelect(el, items){ el.innerHTML = ['전체', ...items].map(v=>`<option value="${v}">${v}</option>`).join(''); }
    fillSelect(els.topic, categories);
    fillSelect(els.type, [...new Set(ideas.map(i=>i.type))]);
    fillSelect(els.difficulty, [...new Set(ideas.map(i=>i.difficulty))]);
    fillSelect(els.team, [...new Set(ideas.map(i=>i.team))]);
    fillSelect(els.duration, [...new Set(ideas.map(i=>i.duration))]);

    function matches(item){
      const keyword = els.keyword.value.trim();
      if (els.topic.value !== '전체' && item.topic !== els.topic.value) return false;
      if (els.type.value !== '전체' && item.type !== els.type.value) return false;
      if (els.difficulty.value !== '전체' && item.difficulty !== els.difficulty.value) return false;
      if (els.team.value !== '전체' && item.team !== els.team.value) return false;
      if (els.duration.value !== '전체' && item.duration !== els.duration.value) return false;
      if (keyword && !`${item.title} ${item.summary} ${item.process}`.includes(keyword)) return false;
      return true;
    }

    function makePool(){
      state.pool = ideas.filter(matches);
      if (!state.pool.length) state.pool = ideas.slice();
    }

    function pick(){
      if (!state.pool.length) makePool();
      const idx = Math.floor(Math.random()*state.pool.length);
      state.current = state.pool.splice(idx,1)[0];
      renderCurrent();
    }

    function renderCurrent(){
      const i = state.current;
      if(!i){els.resultCard.innerHTML='<p class="muted">추천받기를 눌러주세요.</p>'; return;}
      els.resultCard.innerHTML = `
        <h2>${i.title}</h2>
        <div><span class="chip">${i.topic}</span><span class="chip">${i.type}</span><span class="chip">${i.difficulty}</span><span class="chip">${i.team}</span><span class="chip">${i.duration}</span></div>
        <p><strong>문제 상황</strong><br>${i.summary}</p>
        <button id="toggleSummaryBtn">아이디어 요약</button>
        <div id="summaryBox" class="summary">${i.summary}</div>
        <p><strong>진행방법</strong><br>${i.process}</p>
        <p><strong>산출물</strong><br>${i.output}</p>
        <p><strong>추천 이유</strong><br>${i.why}</p>
      `;
      document.getElementById('toggleSummaryBtn').addEventListener('click', ()=>{
        document.getElementById('summaryBox').classList.toggle('open');
      });
    }

    function renderAll(){
      els.allList.innerHTML = ideas.map(i=>`
        <div class="idea-item">
          <strong>${i.title}</strong>
          <div class="muted">${i.topic} · ${i.type} · ${i.difficulty} · ${i.team} · ${i.duration}</div>
          <div class="actions"><button data-summary-id="${i.id}">아이디어 요약</button></div>
          <div id="sum-${i.id}" class="summary">${i.summary}</div>
        </div>
      `).join('');
    }

    els.recommendBtn.addEventListener('click', ()=>{ makePool(); pick(); });
    els.nextBtn.addEventListener('click', ()=> pick());
    els.openAllBtn.addEventListener('click', ()=>{ renderAll(); els.allModal.classList.add('open'); });
    els.closeAllBtn.addEventListener('click', ()=> els.allModal.classList.remove('open'));
    els.allModal.addEventListener('click', (e)=>{ if(e.target === els.allModal) els.allModal.classList.remove('open'); });
    document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') els.allModal.classList.remove('open'); });
    els.allList.addEventListener('click', (e)=>{
      const b = e.target.closest('button[data-summary-id]');
      if(!b) return;
      const box = document.getElementById(`sum-${b.dataset.summaryId}`);
      if(box) box.classList.toggle('open');
    });
  </script>
</body>
</html>
